# =============================================================================
# Google Trends Monitor — Configuration
# =============================================================================
# Edit this file to add/remove keywords. The next scheduled run picks it up.

# -- Brand keywords --------------------------------------------------------
# Meshy + main 3D-generation competitors.
#
# Each entry is either:
#   - a plain string                       -> BROAD string match (default)
#   - { name: "X", entity: "/m/XXXXX" }    -> entity / topic match
#
# Entity match returns substantially more rising queries for established
# brands (closer to the Google Trends web UI). Run
# `python scripts/discover_entities.py` to look up entity ids in batch.
brands:
  - Meshy
  - Tripo
  - Sketchfab    # entity match disabled — pytrends 4.9.2 sends entity ids
                 # as BROAD strings, which Google rejects with HTTP 400.
                 # Re-enable once we migrate to a lib that supports topic
                 # mids (e.g. trendspy) or switch to SerpAPI.
  - Luma AI
  - Rodin AI
  - CSM AI
  - Spline
  - Kaedim
  - Alpha3D
  - Polycam
  - Scenario
  - 3DFY AI
  - Masterpiece Studio

# -- Industry / function keywords ------------------------------------------
# Generic 3D-model space + functional intents.
industry:
  - 3d model
  - 3d image
  - 3d text
  - 3d printing
  - 3d generator
  - ai 3d model
  - text to 3d
  - image to 3d
  - 3d asset
  - 3d animation
  - 3d character
  - 3d avatar

# -- Regions ---------------------------------------------------------------
# `code` is the ISO geo code used by Google Trends. Empty string = Global.
regions:
  - { code: "",   name: "Global" }
  - { code: "US", name: "United States" }
  - { code: "DE", name: "Germany" }
  - { code: "JP", name: "Japan" }
  - { code: "FR", name: "France" }

# -- Thresholds & timeframe ------------------------------------------------
# Only keep Rising related queries whose % change is >= this value.
# Google labels >5000% as "Breakout"; those are always kept.
threshold: 500

# pytrends timeframe. "now 1-d" = past 24 hours (matches "今天热度"
# semantics). Trade-off: sparse — most days a brand keyword has no
# rising queries above threshold. Alternatives: "now 7-d", "today 1-m".
timeframe: "now 1-d"
