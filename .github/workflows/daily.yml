name: Daily Google Trends Monitor

on:
  # GitHub Actions cron is too unreliable on low-activity repos (8-13h
  # slip). Daily scheduling has moved to a Lark Base automation that
  # calls workflow_dispatch precisely at 09:30 Beijing. Manual trigger
  # is still available below.
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: trends-monitor
  cancel-in-progress: false

env:
  DASHBOARD_URL: https://yubingchen-sandy.github.io/seo-tool/
  MAX_ATTEMPTS: "3"
  RETRY_SLEEP_SECONDS: "480"   # 8 minutes between attempts to let rate-limits cool

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Skip if already ran today
        id: gate
        run: |
          # Manual dispatches always run. Scheduled runs check whether
          # today's snapshot was already collected successfully.
          if [ "${{ github.event_name }}" != "schedule" ]; then
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            echo "::notice::Manual trigger — running."
            exit 0
          fi
          today=$(date -u +%Y-%m-%d)
          if [ -f data/last_run_summary.json ]; then
            last_date=$(python -c "import json; print(json.load(open('data/last_run_summary.json'))['date'])")
            last_success=$(python -c "import json; print(json.load(open('data/last_run_summary.json'))['success'])")
            if [ "$today" = "$last_date" ] && [ "$last_success" = "True" ]; then
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              echo "::notice::Today's snapshot already collected — skipping."
              exit 0
            fi
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

      - name: Setup Python
        if: steps.gate.outputs.should_run == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        if: steps.gate.outputs.should_run == 'true'
        run: pip install -r requirements.txt

      - name: Run monitor (up to 3 attempts)
        id: run
        if: steps.gate.outputs.should_run == 'true'
        continue-on-error: true
        run: |
          set +e
          attempt=0
          result="failed"
          while [ $attempt -lt $MAX_ATTEMPTS ]; do
            attempt=$((attempt + 1))
            echo "::group::Attempt $attempt of $MAX_ATTEMPTS"
            python src/monitor.py
            code=$?
            echo "::endgroup::"
            if [ $code -eq 0 ]; then
              result="success"
              break
            fi
            echo "Attempt $attempt failed (exit $code)."
            if [ $attempt -lt $MAX_ATTEMPTS ]; then
              echo "Sleeping $RETRY_SLEEP_SECONDS seconds before retry..."
              sleep "$RETRY_SLEEP_SECONDS"
            fi
          done
          echo "result=$result"     >> "$GITHUB_OUTPUT"
          echo "attempts=$attempt"  >> "$GITHUB_OUTPUT"
          [ "$result" = "success" ]

      - name: Commit data
        if: steps.gate.outputs.should_run == 'true' && steps.run.outputs.result == 'success'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ docs/
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "chore(data): trends snapshot $(date -u +%Y-%m-%d)"
            git push
          fi

      - name: Send Lark notification
        if: always() && steps.gate.outputs.should_run == 'true'
        env:
          LARK_WEBHOOK_URL: ${{ secrets.LARK_WEBHOOK_URL }}
          RUN_RESULT: ${{ steps.run.outputs.result }}
          RUN_ATTEMPTS: ${{ steps.run.outputs.attempts }}
        run: python scripts/notify_lark.py

      - name: Mark job failed if monitor never succeeded
        if: steps.gate.outputs.should_run == 'true' && steps.run.outputs.result != 'success'
        run: exit 1
